<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Go On A Date With Me? ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ff9a9e,#fad0c4);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
}

.heart{
    position:absolute;
    color:white;
    animation:floatHeart linear infinite;
}

@keyframes floatHeart{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:1;
    }
    to{
        transform:translateY(-100px) scale(1.5);
        opacity:0;
    }
}

.card{
    width:90%;
    max-width:700px;
    padding:35px;
    border-radius:30px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.3);
    box-shadow:0 8px 32px rgba(0,0,0,.2);
    text-align:center;
    color:white;
    position:relative;
    z-index:10;
}

.main-heart{
    font-size:70px;
    animation:heartbeat 1.2s infinite;
}

@keyframes heartbeat{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.15)}
}

h1{
    margin:10px 0;
    font-size:2.2rem;
}

.subtitle{
    margin-bottom:20px;
    opacity:.9;
}

input[type=text],
textarea{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:15px;
    margin-top:15px;
}

textarea{
    resize:none;
    height:100px;
}

.date-options{
    margin-top:25px;
    text-align:left;
    background:rgba(255,255,255,.15);
    padding:20px;
    border-radius:20px;
}

.date-options label{
    display:block;
    margin:12px 0;
    cursor:pointer;
}

.response-box{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:25px;
    min-height:70px;
    position:relative;
}

.yes-label{
    background:#ff4081;
    padding:12px 30px;
    border-radius:12px;
    cursor:pointer;
}

.no-btn{
    background:#444;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:12px;
    cursor:pointer;
}

.submit-btn{
    width:100%;
    margin-top:20px;
    border:none;
    padding:15px;
    border-radius:15px;
    background:#ff4081;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.submit-btn:hover{
    transform:scale(1.03);
}

.gallery{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.gallery img{
    width:33%;
    border-radius:12px;
    object-fit:cover;
    height:120px;
}

#success{
    display:none;
    margin-top:20px;
    font-size:1.2rem;
    font-weight:bold;
}

.countdown{
    margin-top:15px;
    font-size:18px;
}
/* Final Question Modal */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    z-index:999999;
    justify-content:center;
    align-items:center;
}

.modal-content{
    width:420px;
    max-width:90%;
    background:white;
    color:#333;
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.modal-content h2{
    color:#ff4081;
    margin-bottom:10px;
}

.answer-box{
    display:flex;
    align-items:center;
    gap:10px;
    margin:20px 0;
}

.answer-box input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
}

#hintBtn{
    cursor:pointer;
    font-size:28px;
}

#confirmBtn{
    width:100%;
    border:none;
    padding:12px;
    border-radius:12px;
    background:#ff4081;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#hintText{
    margin:10px 0;
    color:#ff4081;
    font-weight:600;
}

#errorText{
    color:red;
    margin-top:10px;
}



audio{
    display:none;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="card">

    <div class="main-heart">❤️</div>

    <h1>Hey Beautiful 🌹</h1>

    <p class="subtitle">
        Life is better with good company...
        So I have a question for you 😊
    </p>

    <h2>Will You Go On A Date With Me?</h2>

    <form id="dateForm"
    action="https://formsubmit.co/praveenk012340@gmail.com"
    method="POST"
>

        <input
            type="text"
            id="name"
            placeholder="Your Name ❤️"
            required
        >

        <div class="response-box">

            <label class="yes-label">
                <input
                    type="radio"
                    name="response"
                    value="YES ❤️"
                    checked
                >
                YES ❤️
            </label>

            <button
                type="button"
                id="noBtn"
                class="no-btn"
            >
                NO 😢
            </button>

        </div>

        <div class="date-options">

            <h3>Choose Our Date 🌹</h3>

            <label>
                <input
                    type="radio"
                    name="dateChoice"
                    value="Mall Shopping 🛍️"
                    required
                >
                🛍️ Date 1 - Mall Shopping
            </label>

            <label>
                <input
                    type="radio"
                    name="dateChoice"
                    value="Marine Drive 🌊"
                >
                🌊 Date 2 - Marine Drive
            </label>

            <label>
                <input
                    type="radio"
                    name="dateChoice"
                    value="Movie Date 🎬"
                >
                🎬 Date 3 - Movie Date
            </label>

        </div>

        <textarea
            id="message"
            placeholder="Write something sweet..."
        ></textarea>

        <button
            type="submit"
            class="submit-btn"
        >
            Send My Answer 💌
        </button>

    </form>

    <div id="success"></div>

    <div class="countdown" id="countdown"></div>

    <div class="gallery">
        <img src="https://picsum.photos/300/200?1">
        <img src="https://picsum.photos/300/200?2">
        <img src="https://picsum.photos/300/200?3">
    </div>

</div>

<div id="nameModal" class="modal"> 
    <div class="modal-content"> 
        <h2>💕 One Last Question...</h2> 
        <p>With whom are you going? 😉</p> 
        <div class="answer-box"> 
            <input type="password" id="answerInput" placeholder="Type the name..." > 
            <span id="hintBtn">👁️</span> 
        </div> 
        <p id="hintText"></p> 
        <p id="errorText"></p> 
        <button id="confirmBtn"> Confirm ❤️ </button> 
    </div> 
</div>

<audio id="bgMusic" src="love_song.mp3" loop></audio>
<script>

/*
=========================================
EMAILJS CONFIGURATION
=========================================

emailjs.init({
    publicKey: "YOUR_PUBLIC_KEY"
});

Replace:
YOUR_PUBLIC_KEY
YOUR_SERVICE_ID
YOUR_TEMPLATE_ID
*/

const heartsContainer=document.getElementById('hearts');

for(let i=0;i<40;i++){
    const heart=document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML='❤️';
    heart.style.left=Math.random()*100+'%';
    heart.style.fontSize=(15+Math.random()*25)+'px';
    heart.style.animationDuration=(5+Math.random()*8)+'s';
    heartsContainer.appendChild(heart);
}

const noBtn=document.getElementById('noBtn');

noBtn.addEventListener('mouseover',()=>{
    const x=Math.random()*300;
    const y=Math.random()*200;

    noBtn.style.position='absolute';
    noBtn.style.left=x+'px';
    noBtn.style.top=y+'px';
});

function createConfetti(){
    for(let i=0;i<100;i++){
        const conf=document.createElement('div');

        conf.innerHTML='🎉';
        conf.style.position='fixed';
        conf.style.left=Math.random()*100+'vw';
        conf.style.top='-50px';
        conf.style.fontSize='25px';
        conf.style.zIndex='9999';
        conf.style.transition='3s linear';

        document.body.appendChild(conf);

        setTimeout(()=>{
            conf.style.top='110vh';
        },10);

        setTimeout(()=>{
            conf.remove();
        },3000);
    }
}
const audio = document.getElementById("bgMusic");

let musicStarted = false;

document.body.addEventListener("mouseenter", () => {

    if (!musicStarted) {
        musicStarted = true;

        audio.volume = 0;
        audio.play();

        const fadeIn = setInterval(() => {
            if (audio.volume < 0.95) {
                audio.volume += 0.05;
            } else {
                clearInterval(fadeIn);
            }
        }, 200);
    }

}, { once: true });

const targetDate=new Date();
targetDate.setDate(targetDate.getDate()+7);

function updateCountdown(){

    const now=new Date();
    const diff=targetDate-now;

    const days=Math.floor(diff/(1000*60*60*24));
    const hrs=Math.floor(
        diff%(1000*60*60*24)/(1000*60*60)
    );

    const mins=Math.floor(
        diff%(1000*60*60)/(1000*60)
    );

    document.getElementById('countdown').innerHTML=
        `⏳ Countdown To Our Date:
        ${days} Days ${hrs} Hours ${mins} Minutes`;
}

const YOUR_NAME = "Kanji";

let pendingFormData = null;

document.getElementById('dateForm')
.addEventListener('submit',function(e){

    e.preventDefault();

    pendingFormData = {
        name: document.getElementById('name').value,
        dateChoice: document.querySelector(
            'input[name="dateChoice"]:checked'
        ).value,
        message: document.getElementById('message').value
    };

    document.getElementById('nameModal')
        .style.display = 'flex';
});

document.getElementById('confirmBtn')
.addEventListener('click',()=>{

    const answer =
        document.getElementById('answerInput')
        .value
        .trim()
        .toLowerCase();

    if (!answer.includes(YOUR_NAME.toLowerCase())) {

        document.getElementById('errorText').innerHTML =
            "❌ Wrong answer. Think carefully 😉";

        return;
    }

    createConfetti();

    document.getElementById('nameModal').style.display = 'none';

    setTimeout(() => {
        document.getElementById('dateForm').submit();
    }, 1500);
});

const hints = [
    "👁️👁️",
    "💡Starts with K 😉"
];

const yourName = YOUR_NAME.toLowerCase();

let hintIndex = 0;

document.getElementById('hintBtn')
.addEventListener('click',()=>{

    document.getElementById('hintText').innerHTML =
        hints[Math.min(hintIndex, hints.length - 1)];

    hintIndex++;
});
document.getElementById('confirmBtn')
.addEventListener('click',()=>{

    const answer =
        document.getElementById('answerInput')
        .value
        .trim()
        .toLowerCase();

    if (!answer.includes(YOUR_NAME.toLowerCase())) {

        document.getElementById('errorText').innerHTML =
            "❌ Wrong answer. Think carefully 😉";

        return;
    }

    document.getElementById('errorText').innerHTML = '';

    createConfetti();

    document.getElementById('nameModal')
        .style.display = 'none';

    document.getElementById('success').style.display='block';

    document.getElementById('success').innerHTML =
        `💖 Correct Answer! 💖<br><br>
        Looks like you're going with ${YOUR_NAME} ❤️<br><br>
        Date Selected: ${pendingFormData.dateChoice}`;

    // Submit to FormSubmit after showing success
    setTimeout(() => {
        document.getElementById('dateForm').submit();
    }, 2000);

});



updateCountdown();
setInterval(updateCountdown,60000);
</script>

</body>
</html>
